name: Deploy Backend to ECS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build -t 250500556892.dkr.ecr.us-east-1.amazonaws.com/sweetrobo-casebot-backend:latest .
          docker push 250500556892.dkr.ecr.us-east-1.amazonaws.com/sweetrobo-casebot-backend:latest

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster sweetrobo-backend-ecs \
            --service sweetrobo-casebot-service \
            --force-new-deployment
